name: Post to Facebook

on:
  push:
    paths:
      - 'data/content_ready/**_pending.json'
      - 'data/content_ready/*_pending.json'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Write credentials
        run: |
          mkdir -p config/credentials
          printf "FACEBOOK_PAGE_ID=%s\nFACEBOOK_ACCESS_TOKEN=%s\n" \
            "${{ secrets.FACEBOOK_PAGE_ID }}" \
            "${{ secrets.FACEBOOK_ACCESS_TOKEN }}" \
            > config/credentials/velocx_nz.env

      - name: Post to Facebook
        run: python main.py --industry velocx_nz

      - name: Commit posted archive back to repo
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add data/content_ready/ data/content_posted/
          git diff --staged --quiet || git commit -m "posted: velocx_nz $(date +'%Y%m%d_%H%M%S')"
          git push
