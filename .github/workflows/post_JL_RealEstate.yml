name: Post - JL RealEstate

on:
  push:
    paths:
      - 'data/content_ready/JL_RealEstate_*_pending.json'
  workflow_dispatch:   # allows schedule_JL_RealEstate.yml to trigger this directly

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  post:
    runs-on: ubuntu-latest
    environment: JL_RealEstate
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write credentials
        env:
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          mkdir -p config/credentials
          printf "FACEBOOK_PAGE_ID=%s\nFACEBOOK_ACCESS_TOKEN=%s\nANTHROPIC_API_KEY=%s\n" \
            "$FACEBOOK_PAGE_ID" \
            "$FACEBOOK_ACCESS_TOKEN" \
            "$ANTHROPIC_API_KEY" \
            > config/credentials/JL_RealEstate.env

      - name: Configure git
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}

      - name: Post to platforms
        run: python main.py --industry JL_RealEstate

      - name: Commit results back to repo
        run: |
          git add data/content_ready/ data/content_posted/
          git diff --staged --quiet || git commit -m "posted: JL_RealEstate $(date +'%Y%m%d_%H%M%S')"
          git push
