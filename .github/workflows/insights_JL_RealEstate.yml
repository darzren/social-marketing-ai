name: Insights & Strategy - JL RealEstate

on:
  schedule:
    - cron: '0 18 * * 0'   # Sunday 6am NZT — weekly strategy refresh
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  insights:
    runs-on: ubuntu-latest
    environment: JL_RealEstate
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write credentials
        env:
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          mkdir -p config/credentials
          printf "FACEBOOK_PAGE_ID=%s\nFACEBOOK_ACCESS_TOKEN=%s\nANTHROPIC_API_KEY=%s\n" \
            "$FACEBOOK_PAGE_ID" \
            "$FACEBOOK_ACCESS_TOKEN" \
            "$ANTHROPIC_API_KEY" \
            > config/credentials/JL_RealEstate.env

      - name: Run performance tracker
        run: python src/performance_tracker.py --industry JL_RealEstate --days 30

      - name: Run strategy updater
        run: python src/strategy_updater.py --industry JL_RealEstate

      - name: Commit insights, strategy, and updated brand config
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git add data/insights/ config/strategy/ config/industries/JL_RealEstate.json
          git diff --staged --quiet || (git commit -m "insights: JL_RealEstate strategy update $(date +'%Y%m%d')" && git push)
