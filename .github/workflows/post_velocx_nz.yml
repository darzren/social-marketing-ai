name: Post - VelocX NZ

on:
  push:
    paths:
      - 'data/content_ready/velocx_nz_*_pending.json'
  workflow_dispatch:   # allows schedule_velocx_nz.yml to trigger this directly

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  post:
    runs-on: ubuntu-latest
    environment: velocx_nz
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests python-dotenv pillow anthropic

      - name: Write credentials
        env:
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          mkdir -p config/credentials
          printf "FACEBOOK_PAGE_ID=%s\nFACEBOOK_ACCESS_TOKEN=%s\nANTHROPIC_API_KEY=%s\n" \
            "$FACEBOOK_PAGE_ID" \
            "$FACEBOOK_ACCESS_TOKEN" \
            "$ANTHROPIC_API_KEY" \
            > config/credentials/velocx_nz.env

      - name: Post to platforms
        run: python main.py --industry velocx_nz

      - name: Commit results back to repo
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add data/content_ready/ data/content_posted/
          git diff --staged --quiet || git commit -m "posted: velocx_nz $(date +'%Y%m%d_%H%M%S')"
          git push
