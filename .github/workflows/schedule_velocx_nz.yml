name: Schedule - VelocX NZ

on:
  schedule:
    - cron: '0 * * * *'   # every hour — scheduler decides internally if it's a posting window
  workflow_dispatch:
    inputs:
      force:
        description: 'Force post immediately (skip timing check)'
        type: boolean
        default: false

permissions:
  contents: write
  actions: write   # needed to trigger post_velocx_nz.yml via gh workflow run

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  schedule:
    runs-on: ubuntu-latest
    environment: velocx_nz
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests python-dotenv pillow anthropic pytz
        # gh CLI is pre-installed on ubuntu-latest runners

      - name: Write credentials
        env:
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          mkdir -p config/credentials
          printf "FACEBOOK_PAGE_ID=%s\nFACEBOOK_ACCESS_TOKEN=%s\nANTHROPIC_API_KEY=%s\n" \
            "$FACEBOOK_PAGE_ID" \
            "$FACEBOOK_ACCESS_TOKEN" \
            "$ANTHROPIC_API_KEY" \
            > config/credentials/velocx_nz.env

      - name: Configure git
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}

      - name: Run content scheduler
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ inputs.force }}" = "true" ]; then
            python src/content_scheduler.py --industry velocx_nz --force
          else
            python src/content_scheduler.py --industry velocx_nz
          fi
